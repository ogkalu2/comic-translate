[project]
name = "comic-translate-rendering"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "comic-translate-core>=0.1.0",
  "numpy>=1.24.0",
  "Pillow>=10.0",
  "opencv-python>=4.8.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
