[project]
name = "comic-translate-detection"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "comic-translate-core>=0.1.0",
  "numpy>=1.24.0",
  "Pillow>=10.0",
  "onnxruntime>=1.16.0",
  "shapely>=2.0.0",
  "pyclipper>=1.3.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "ruff>=0.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
