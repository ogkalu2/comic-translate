[project]
name = "comic-translate-qa"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "comic-translate-core>=0.1.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.30"]
openai = ["openai>=1.0"]
cli = ["click>=8.1"]
dev = ["pytest>=8.0", "ruff>=0.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
