[project]
name = "comic-translate-translation"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "comic-translate-core>=0.1.0",
  "requests>=2.31.0",
]

[project.optional-dependencies]
deepl = ["deepl>=1.16.0"]
openai = ["openai>=1.0"]
gemini = ["google-generativeai>=0.3.0"]
dev = ["pytest>=8.0", "ruff>=0.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
